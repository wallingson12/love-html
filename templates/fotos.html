<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotos 📸</title>

    <!-- CSS global do projeto -->
    <link rel="stylesheet" href="../css/style.css">

    <style>
        /* =========================
           CONTAINER DE FOTOS
        ========================= */
        .container.photos {
            margin-top: 12vh; /* afastar do topo */
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px; /* espaço entre fotos */
        }

        /* Estilo das imagens */
        .photo-container img {
            width: 200px;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s;
            opacity: 0;  /* Começa invisível */
            animation: fadeIn 1s forwards;  /* Aplica a animação fadeIn */
        }

        .photo-container img:hover {
            transform: scale(1.05);
        }

        /* =========================
           ANIMAÇÃO FADE-IN
        ========================= */
        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        /* =========================
           RESPONSIVO
        ========================= */
        @media (max-width: 768px) {
            .photo-container img {
                width: 150px;
            }
        }

        @media (max-width: 480px) {
            .container.photos {
                margin-top: 8vh;
            }
            .photo-container img {
                width: 45vw;
            }
        }
    </style>
</head>

<body>

<header>
    <nav>
        <ul>
            <li><a href="recados.html">Recados</a></li>
            <li><a href="fotos.html">Fotos</a></li>
        </ul>
    </nav>
</header>

<!-- CONTAINER DE FOTOS -->
<div class="container photos">
    <div class="photo-container">
        <img src="../imagens/foto1.png" alt="Foto 1">
    </div>
    <div class="photo-container">
        <img src="../imagens/foto2.png" alt="Foto 2">
    </div>
    <div class="photo-container">
        <img src="../imagens/foto3.png" alt="Foto 3">
    </div>
    <div class="photo-container">
        <img src="../imagens/foto4.png" alt="Foto 4">
    </div>
    <div class="photo-container">
        <img src="../imagens/foto5.png" alt="Foto 5">
    </div>
    <div class="photo-container">
        <img src="../imagens/foto6.png" alt="Foto 6">
    </div>
</div>

</body>
</html>

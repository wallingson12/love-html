<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Quiz Romântico</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: linear-gradient(to top, #ff4d6d, #ff6b81, #ff8fa3);
        }

        .quiz-container {
            background-color: rgba(255, 255, 255, 0.96); /* fundo igual aos poemas */
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            max-width: 740px;
            width: 100%;
        }

        .question {
            font-size: 35px;
            margin-bottom: 30px;
            color: darkred; /* vermelho escuro */
        }

        .options {
            list-style: none;
            padding: 0;
        }

        .option {
            display: block;
            padding: 15px 30px;
            margin: 10px 0;
            background-color: #ff4d6d; /* rosa principal */
            color: #fff; /* texto branco */
            border-radius: 12px;
            cursor: pointer;
            font-size: 25px;
            transition: background-color 0.3s, transform 0.2s;
        }

        .option:hover {
            background-color: #ff6b81; /* rosa mais escuro no hover */
            transform: scale(1.05);
        }

        #message {
            color: darkred;
            font-size: 20px;
            margin-top: 15px;
            min-height: 25px;
        }

        @media (max-width: 768px) {
            .quiz-container {
                padding: 20px;
            }
            .question {
                font-size: 28px;
            }
            .option {
                font-size: 22px;
            }
        }

        @media (max-width: 480px) {
            .question {
                font-size: 22px;
            }
            .option {
                font-size: 18px;
                padding: 12px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <p id="question" class="question"></p>
        <ul id="options" class="options"></ul>
        <p id="message"></p>
    </div>
       <script src="../quiz.js"></script>
</body>
</html>
